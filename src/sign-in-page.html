<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-['Plus_Jakarta_Sans',_sans-serif] min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-[480px] rounded-[20px] p-10 md:p-14 shadow-sm border border-slate-50">
        
        <div class="flex items-center gap-2.5 mb-10">
            <img src="/img/icon.png" alt="LokalaMart Logo" class="h-10 w-auto">
        </div>

        <div class="mb-8">
            <h1 class="text-2xl font-bold text-slate-900">Masuk</h1>
        </div>

        <form action="#" class="space-y-6">
            <div class="space-y-2">
                <label for="name" class="text-sm font-bold text-slate-900">Nama Lengkap</label>
                <input 
                    type="text" 
                    id="name" 
                    placeholder="John Doe" 
                    class="w-full bg-slate-50 border-none rounded-2xl py-4 px-5 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300"
                >
            </div>

            <div class="space-y-2">
                <label for="email" class="text-sm font-bold text-slate-900">Alamat Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="john@example.com" 
                    class="w-full bg-slate-50 border-none rounded-2xl py-4 px-5 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300"
                >
            </div>

            <div class="space-y-2">
                <label for="password" class="text-sm font-bold text-slate-900">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="********" 
                    class="w-full bg-slate-50 border-none rounded-2xl py-4 px-5 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300"
                >
            </div>

            <button type="button" onclick="window.location.href='home-page.html'"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-sm hover:bg-blue-700 transition-colors shadow-lg shadow-blue-100 mt-4"
            >
                Masuk
            </button>
        </form>
    </div>

</body>
</html>
